<!DOCTYPE html>
<html lang="en">

<head>
  <meta name="author" content="Taraknath Karan">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="shortcut icon" href="https://taraknath341.codeberg.page/client_storage/logo.svg" type="image/x-icon">
  <title>Tarak Notes - Tarak Program</title>
  <link rel="stylesheet" href="./css/header.css">
  <link rel="stylesheet" href="./css/panal.css">
  <link rel="stylesheet" href="./css/sidebar.css">
  <link rel="stylesheet" href="./css/text-editor.css">
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>
  <!-- HEADER -->
  <dialog>
    <input type="text" placeholder="Enter Note Title">
    <p style="color: pink"></p>

    <input type="button" class="btn" value="Cancel">
    <input type="button" class="btn" value="Create">
  </dialog>

  <header class="header">
    <div class="logo">
      <img src="https://taraknath341.codeberg.page/client_storage/logo.svg" class="logo-icon">
      <span>Tarak Notes</span>
    </div>

    <div class="panal-button">
      <button class="panal-hide-show" tabler>
        <!-- 🕹️ -->
        &#xef37;
      </button>
      <button class="delete" tabler>
        <!-- 🗑️ -->
        &#xeb41;
      </button>
      <button class="save" tabler>
        <!-- 💾 -->
        &#xeb62;
      </button>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <div class="main-content">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <button class="reload" tabler>
          <!-- reload -->
          &#xf3ae;
        </button>
        <button class="newNote" tabler>
          <!-- New Note -->
          &#xeaa0;
        </button>
        <a href="/auth/logout">
          <button tabler>
            <!-- Logout -->
            &#xfa7e;
          </button>
        </a>
        <a href="https://github.com/taraknath341/tarak-notes">
          <button tabler>
            <!-- Github -->
            &#xec1c;
          </button>
        </a>
      </div>
      <div class="sidebar-content">
        <!-- <div class="note-title">Welcome to NoteHub</div> -->
      </div>
    </aside>

    <!-- EDITOR SECTION -->
    <section class="editor-section">
      <!-- TOOLBAR -->

      <!-- TEXT EDITOR -->
      <div class="editor-container">
        <textarea class="editor-input" placeholder="This is Your Text Editor..." disabled></textarea>
      </div>
    </section>
  </div>
  <script>
    "use strict";
    const $ = (element) => document.querySelector(element);
    const $$ = (element) => document.querySelectorAll(element);
    const username = "taraknath";
  </script>
  <script src="./js/grafix.js"></script>
  <script src="./js/script.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

  <title>Login & SignUp - Tarak Program</title>
  <link rel="shortcut icon" href="https://taraknath341.codeberg.page/client_storage/logo.svg" type="image/x-icon">

</head>

<body>
  <form action="/auth/create-user" method="post">
    <img src="./svg/logo.svg" height="60">
    <font size="7">SignUp</font>
    <br><br>

  </form>
  <script src="js/otp.js"></script>
</body>

</html>
